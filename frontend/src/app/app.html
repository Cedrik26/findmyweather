<!-- Fullscreen OpenStreetMap background -->
<div #map class="map" aria-hidden="true"></div>

<!-- LCP-friendly placeholder over the map (shown until first tiles loaded) -->
<div class="mapPlaceholder" *ngIf="mapLoading" aria-hidden="true">
  <div class="mapPlaceholder__skeleton"></div>
  <div class="mapPlaceholder__hint">Karte wird geladen…</div>
</div>

<!-- Logo overlay (oben links) -->
<a class="logo" href="/" aria-label="FindMyWeather">
  <img src="/logo.png" alt="FindMyWeather Logo" />
</a>

<!-- Graph overlay (unten rechts, über der Karte) -->
<div class="graphOverlay" *ngIf="showGraph">
  <app-graphwindow
    [stationId]="selectedStationId"
    [startYear]="selectedStartYear"
    [endYear]="selectedEndYear"
    (close)="closeGraph()" />
</div>

<!-- UI overlay -->
<mat-sidenav-container class="shell">
  <mat-sidenav
    #appSidenav
    class="sidenav"
    mode="side"
    position="end"
    [opened]="true"
    [fixedInViewport]="true"
    aria-label="Seitenleiste">
    <app-sidenav
      [latitude]="latitude"
      [longitude]="longitude"
      (coordinatesChange)="onCoordinatesChange($event)"
      (radiusChange)="onRadiusChange($event)"
      (lookupStations)="onLookupStations($event)" />
  </mat-sidenav>

  <mat-sidenav-content>
    <!-- optionaler Content; Map ist bereits im Hintergrund -->
  </mat-sidenav-content>
</mat-sidenav-container>
