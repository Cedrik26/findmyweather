<div class="panel">
  <h2>FindMyWeather 1.0.0</h2>

  <div class="form">
    <mat-form-field subscriptSizing="dynamic">
      <mat-label>Breitengrad</mat-label>
      <input matInput [(ngModel)]="latitudeValue" (ngModelChange)="onCoordinatesInputChange()" />
    </mat-form-field>

    <mat-form-field subscriptSizing="dynamic">
      <mat-label>Längengrad</mat-label>
      <input matInput [(ngModel)]="longitudeValue" (ngModelChange)="onCoordinatesInputChange()" />
    </mat-form-field>

    <!-- Radius slider -->
    <div class="block">
      <div class="row" style="grid-template-columns: 1fr auto; align-items: center;">
        <div class="label" style="margin: 0;">Radius</div>
        <div class="hint" style="margin: 0;">{{ radius }} km</div>
      </div>
      <div class="sliderWrap">
        <mat-slider min="1" max="100" step="1" showTickMarks>
          <input
            matSliderThumb
            [(ngModel)]="radius"
            name="radius"
            (ngModelChange)="onRadiusChange($event)" />
        </mat-slider>
      </div>
    </div>

    <!-- Weather stations: select all toggle + optional count slider -->
    <div class="block">
      <div class="row" style="grid-template-columns: 1fr auto; align-items: center;">
        <div class="label" style="margin: 0;">Alle Wetterstationen anzeigen</div>
        <mat-slide-toggle
          [(ngModel)]="selectAllStations"
          name="selectAllStations"
          aria-label="Alle Wetterstationen anzeigen" />
      </div>

      <ng-container *ngIf="!selectAllStations">
        <div class="label" style="margin-top: 10px;">Anzahl Wetterstationen: {{ weatherStationCount }}</div>
        <div class="sliderWrap">
          <mat-slider min="1" max="10" step="1" showTickMarks>
            <input matSliderThumb [(ngModel)]="weatherStationCount" name="weatherStationCount" />
          </mat-slider>
        </div>
      </ng-container>
    </div>

    <!-- Year-only Picker: two fields side by side -->
    <div class="block">
      <div class="yearRow">
        <mat-form-field appearance="outline" subscriptSizing="dynamic">
          <mat-label>Startjahr</mat-label>
          <input matInput [matDatepicker]="startYearPicker" [(ngModel)]="startYear" [max]="maxDate" />
          <mat-datepicker-toggle matIconSuffix [for]="startYearPicker"></mat-datepicker-toggle>
          <mat-datepicker
            #startYearPicker
            startView="multi-year"
            (yearSelected)="setStartYear($event, startYearPicker)">
          </mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" subscriptSizing="dynamic">
          <mat-label>Endjahr</mat-label>
          <input matInput [matDatepicker]="endYearPicker" [(ngModel)]="endYear" [max]="maxDate" />
          <mat-datepicker-toggle matIconSuffix [for]="endYearPicker"></mat-datepicker-toggle>
          <mat-datepicker
            #endYearPicker
            startView="multi-year"
            (yearSelected)="setEndYear($event, endYearPicker)">
          </mat-datepicker>
        </mat-form-field>
      </div>
    </div>

    <div class="noStationsHint" *ngIf="noStationsFound">Keine Wetterstationen gefunden</div>

    <button
      class="cta"
      mat-flat-button
      color="primary"
      type="button"
      (click)="lookupWeatherStations()"
      [disabled]="!startYear || !endYear">
      Wetterstationen suchen
    </button>

    <!-- Dark mode switch bottom right -->
    <div class="darkmodeRow">
      <span class="darkmodeLabel">Normal</span>
      <mat-slide-toggle
        [(ngModel)]="darkMode"
        name="darkMode"
        aria-label="Darkmode umschalten"
        (ngModelChange)="onDarkModeToggle($event)">
        Dunkel
      </mat-slide-toggle>
    </div>
  </div>
</div>
