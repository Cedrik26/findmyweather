<div class="panel">
  <h2>ShowMyWeather</h2>

  <div class="form">
    <mat-form-field subscriptSizing="dynamic">
      <mat-label>Latitude</mat-label>
      <input matInput [(ngModel)]="latitude" />
    </mat-form-field>

    <mat-form-field subscriptSizing="dynamic">
      <mat-label>Longitude</mat-label>
      <input matInput [(ngModel)]="longitude" />
    </mat-form-field>

    <!-- Radius slider -->
    <div class="block">
      <div class="row" style="grid-template-columns: 1fr auto; align-items: center;">
        <div class="label" style="margin: 0;">Radius</div>
        <div class="hint" style="margin: 0;">{{ radius }}</div>
      </div>
      <mat-slider min="1" max="100" step="1" showTickMarks>
        <input matSliderThumb [(ngModel)]="radius" name="radius" />
      </mat-slider>
    </div>

    <!-- Weather stations: select all toggle + optional count slider -->
    <div class="block">
      <div class="row" style="grid-template-columns: 1fr auto; align-items: center;">
        <div class="label" style="margin: 0;">Alle Wetterstationen anzeigen</div>
        <mat-slide-toggle [(ngModel)]="selectAllStations" name="selectAllStations" aria-label="Alle Wetterstationen anzeigen" />
      </div>

      <ng-container *ngIf="!selectAllStations">
        <div class="label" style="margin-top: 10px;">Anzahl Wetterstationen: {{ weatherStationCount }}</div>
        <mat-slider min="1" max="10" step="1" showTickMarks>
          <input matSliderThumb [(ngModel)]="weatherStationCount" name="weatherStationCount" />
        </mat-slider>
      </ng-container>
    </div>

    <mat-form-field subscriptSizing="dynamic">
      <mat-label>Number of Weather stations</mat-label>
      <input matInput [(ngModel)]="stations" />
    </mat-form-field>

    <div class="block">
      <mat-form-field subscriptSizing="dynamic">
        <mat-label>Select Weather station</mat-label>
        <mat-select [(ngModel)]="stationCount">
          <mat-option *ngFor="let opt of stationOptions" [value]="opt">{{ opt }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <mat-form-field class="rowField" subscriptSizing="dynamic">
      <mat-label>Start</mat-label>
      <input matInput [(ngModel)]="start" />
    </mat-form-field>

    <mat-form-field class="rowField" subscriptSizing="dynamic">
      <mat-label>End</mat-label>
      <input matInput [(ngModel)]="end" />
    </mat-form-field>

    <button class="cta" matButton="elevated" type="button" (click)="lookupWeatherStations()">
      lookup weather stations
    </button>
  </div>
</div>
