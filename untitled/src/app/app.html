<!-- Fullscreen OpenStreetMap background -->
<div #map class="map" aria-hidden="true"></div>

<!-- Logo overlay (oben links) -->
<a class="logo" href="/" aria-label="FindMyWeather">
  <img src="/logo.png" alt="FindMyWeather Logo" />
</a>

<!-- UI overlay -->
<mat-sidenav-container class="shell">
  <mat-sidenav
    class="sidenav"
    mode="side"
    position="end"
    [opened]="true"
    [fixedInViewport]="true"
    aria-label="Seitenleiste">
    <app-sidenav />
  </mat-sidenav>

  <mat-sidenav-content>
    <!-- optionaler Content; Map ist bereits im Hintergrund -->
  </mat-sidenav-content>
</mat-sidenav-container>
